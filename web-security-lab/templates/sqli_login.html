<!DOCTYPE html>
<html lang="zh">
<head><meta charset="UTF-8"><title>SQL 注入 - 登录绕过</title>
<style>
    * { margin:0;padding:0;box-sizing:border-box; }
    body { font-family:'Segoe UI',sans-serif; background:#0d1117; color:#c9d1d9; }
    .container { max-width:600px; margin:50px auto; padding:20px; }
    h1 { color:#58a6ff; margin-bottom:8px; }
    .desc { color:#8b949e; margin-bottom:20px; font-size:0.9em; }
    .hint { background:#1a1f2b; border-left:3px solid #f0883e; padding:12px; margin-bottom:20px; border-radius:4px; color:#f0883e; font-size:0.9em; }
    .hint code { background:#21262d; padding:1px 4px; border-radius:3px; }
    input { width:100%; padding:10px; margin-bottom:10px; background:#161b22; border:1px solid #30363d;
            border-radius:6px; color:#c9d1d9; font-size:1em; }
    button { width:100%; padding:10px; background:#238636; color:#fff; border:none; border-radius:6px;
             font-size:1em; cursor:pointer; }
    button:hover { background:#2ea043; }
    .result { margin-top:20px; padding:15px; background:#161b22; border-radius:6px; border:1px solid #30363d;
              white-space:pre-wrap; font-family:'Consolas',monospace; font-size:0.85em; }
    a { color:#58a6ff; }
    .back { margin-top:20px; }
</style></head>
<body>
<div class="container">
    <h1>🔓 SQL 注入 — 登录绕过</h1>
    <p class="desc">这是一个故意存在漏洞的登录页面。尝试在不使用正确密码的情况下以 admin 身份登录。</p>

    <div class="hint">
        💡 <strong>提示：</strong>试试用户名输入 <code>admin' OR '1'='1' --</code>，密码随便填。<br>
        <details><summary>更多提示</summary>
            <ul style="margin-top:8px;padding-left:20px;">
                <li><code>admin'--</code> —— 注释掉密码检查</li>
                <li><code>' OR 1=1--</code> —— 永真条件</li>
                <li><code>admin' OR '1'='1</code> —— 经典万能密码</li>
            </ul>
        </details>
    </div>

    <form method="post">
        <input type="text" name="username" placeholder="用户名" required>
        <input type="password" name="password" placeholder="密码">
        <button type="submit">登录</button>
    </form>

    {% if message %}
    <div class="result">{{ message|safe }}</div>
    {% endif %}

    <p class="back"><a href="/">← 返回首页</a></p>
</div>
</body>
</html>
