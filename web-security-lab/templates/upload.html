<!DOCTYPE html>
<html lang="zh">
<head><meta charset="UTF-8"><title>文件上传漏洞</title>
<style>
    * { margin:0;padding:0;box-sizing:border-box; }
    body { font-family:'Segoe UI',sans-serif; background:#0d1117; color:#c9d1d9; }
    .container { max-width:600px; margin:50px auto; padding:20px; }
    h1 { color:#58a6ff; margin-bottom:8px; }
    .desc { color:#8b949e; margin-bottom:20px; font-size:0.9em; }
    .hint { background:#1a1f2b; border-left:3px solid #f0883e; padding:12px; margin-bottom:20px; border-radius:4px; color:#f0883e; font-size:0.9em; }
    .hint code { background:#21262d; padding:1px 4px; border-radius:3px; }
    input[type=file] { width:100%; padding:10px; margin-bottom:10px; background:#161b22; border:1px solid #30363d;
            border-radius:6px; color:#c9d1d9; font-size:1em; }
    button { width:100%; padding:10px; background:#238636; color:#fff; border:none; border-radius:6px;
             font-size:1em; cursor:pointer; }
    .msg { padding:15px; background:#161b22; border-radius:6px; border:1px solid #30363d; margin-top:20px; }
    .msg.success { border-color:#238636; }
    a { color:#58a6ff; }
    .back { margin-top:20px; }
</style></head>
<body>
<div class="container">
    <h1>📁 文件上传漏洞</h1>
    <p class="desc">上传功能没有检查文件类型和扩展名。尝试上传一个可执行的脚本文件（Web Shell）。</p>

    <div class="hint">
        💡 <strong>提示：</strong>
        <details><summary>点击展开</summary>
            <ul style="margin-top:8px;padding-left:20px;">
                <li>上传一个 <code>shell.py</code> 内容：
                    <br><code>import os; print(os.popen('dir').read())</code>
                </li>
                <li>然后访问 <code>/uploads/shell.py</code> 查看效果</li>
                <li>防御：检查扩展名、文件类型、重命名文件、限制目录执行权限</li>
            </ul>
        </details>
    </div>

    <form method="post" enctype="multipart/form-data">
        <input type="file" name="file" required>
        <button type="submit">上传</button>
    </form>

    {% if message %}
    <div class="msg success">{{ message }}</div>
    {% endif %}

    <p class="back"><a href="/">← 返回首页</a></p>
</div>
</body>
</html>
